#==============================================================
# 超觅 Ultraseek 官网 — Nginx 配置（ECS / Docker 通用）
#--------------------------------------------------------------
# 适用场景：
#   - 阿里云 ECS 部署：把此文件放到 /etc/nginx/conf.d/ultraseek.conf
#   - Docker 部署：COPY 到 /etc/nginx/conf.d/default.conf
#
# 前端为 SPA（HashRouter），所有路由都需回退到 index.html
#==============================================================

# gzip 压缩配置
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css text/xml text/javascript
           application/javascript application/json
           application/xml application/xml+rss
           image/svg+xml font/woff2;

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # 静态文件根目录（Docker 中为 /usr/share/nginx/html）
    root   /usr/share/nginx/html;
    index  index.html;

    # 安全：隐藏 nginx 版本
    server_tokens off;

    # SPA 路由回退：所有未匹配的路径都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存（带 hash 的 js/css/fonts/images）
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html 不缓存，保证发布后立即生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # 健康检查端点（给阿里云 SLB / 容器健康检查用）
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
